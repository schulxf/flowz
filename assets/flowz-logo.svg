<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 640" role="img" aria-label="Flowz logo">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="62%" stop-color="#f8fdff"/>
      <stop offset="100%" stop-color="#eef8ff"/>
    </radialGradient>
    <linearGradient id="blue" x1="18%" y1="18%" x2="82%" y2="82%">
      <stop offset="0%" stop-color="#42b8ff"/>
      <stop offset="52%" stop-color="#168fe0"/>
      <stop offset="100%" stop-color="#0b78c8"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#168fe0" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="1600" height="640" fill="url(#bg)"/>
  <text x="50%" y="55%" text-anchor="middle"
        font-family="Segoe Script, Brush Script MT, Pacifico, cursive"
        font-size="250" font-weight="700"
        fill="url(#blue)" filter="url(#softShadow)">flowz</text>
</svg>
